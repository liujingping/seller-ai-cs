name = "seller-ai-cs"
main = "src/index.ts"
compatibility_date = "2024-05-12"

# Secrets (set via `wrangler secret put`):
#   CLAUDE_API_KEY       — Anthropic API key
#   SHOPS_CONFIG         — JSON array of shop configurations
#   SHOP_*               — Per-shop credential secrets (referenced in SHOPS_CONFIG)

[vars]
CLAUDE_MODEL = "claude-haiku-4.5"

[[kv_namespaces]]
binding = "CHAT_HISTORY"
id = "placeholder"
