#   PDD_CLIENT_SECRET — 拼多多开放平台 client_secret
#   PDD_ACCESS_TOKEN  — 拼多多商家授权 access_token

[vars]
CLAUDE_MODEL = "claude-haiku-4.5"
ANTHROPIC_BASE_URL = "https://copilot.ljp-copilot.workers.dev"
